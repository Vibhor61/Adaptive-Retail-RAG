services:
  postgres:
    image: postgres:17
    container_name: rag_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: rag_phoenix
    ports:
      - "6006:6006"
    volumes:
      - phoenix_data:/data
    environment:
      PHOENIX_WORKING_DIR: /data

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_fastapi
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >-
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir /app/graph_layer
      --reload-dir /app/generation_layer
      --reload-dir /app/orchestration
      --reload-dir /app/retrieval_layer
      --reload-dir /app/routing_layer
      --reload-dir /app/config
      --reload-dir /app/contracts
      --reload-dir /app/utility_functions
      --reload-include main.py
    
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_streamlit
    env_file: .env
    environment:
      - BACKEND_URL=http://fastapi:8000
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    volumes:
      - .:/app
    command: streamlit run ui.py --server.address 0.0.0.0 --server.port 8501

volumes:
  postgres_data:
  qdrant_data:
  phoenix_data: